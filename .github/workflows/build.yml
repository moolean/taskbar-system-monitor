name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: powershell
        run: .\build.ps1

      - name: Self-test
        shell: powershell
        run: |
          $process = Start-Process `
            -FilePath .\dist\TaskbarSystemMonitor.exe `
            -ArgumentList '--self-test' `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Self-test failed with exit code $($process.ExitCode)"
          }

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarSystemMonitor-win
          path: dist/TaskbarSystemMonitor.exe
